locale: "zh-CN"
site_theme: "default"
title: "管进程"
title_separator: "-"
name: &name "管进程"
description: &description "管进程的个人学术主页，研究方向为 ECSP 框架下判定问题、优化问题和计数问题。"
url: "https://gjc2.github.io"
baseurl: "/personal-page"
repository: "gjc2/personal-page"

author:
  avatar: "profile.png"
  name: "管进程"
  pronouns:
  bio: "计算机科学与技术本科生"
  location: "中国科学技术大学"
  employer: "计算机科学与技术学院"
  uri:
  email: "guanjc02@gmail.com"
  academia:
  arxiv:
  googlescholar:
  inspire-hep:
  impactstory:
  orcid:
  semantic:
  ssrn:
  pubmed:
  researchgate:
  scopus:
  zotero:
  bitbucket:
  codepen:
  dribbble:
  github: "gjc2"
  kaggle:
  stackoverflow:
  artstation:
  bluesky:
  facebook:
  flickr:
  foursquare:
  goodreads:
  google_plus:
  keybase:
  instagram:
  lastfm:
  linkedin:
  mastodon:
  medium:
  pinterest:
  soundcloud:
  steam:
  telegram:
  tumblr:
  twitter:
  vine:
  weibo:
  wikipedia:
  xing:
  youtube:
  zhihu:

publication_category:
  research:
    title: "Research"
  projects:
    title: "Projects"

teaser:
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"
talkmap_link: false
comments:
  provider:

atom_feed:
  hide: false
  path:

analytics:
  provider: "false"

include:
  - .htaccess
  - _pages
  - files

exclude:
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - vendor
  - tmp
  - README.md

keep_files:
  - .git

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

collections:
  publications:
    output: true
    permalink: /:collection/:path/

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: false
      comments: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
