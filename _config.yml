url: "https://gjc2.github.io"
baseurl: ""
repository: "gjc2/gjc2.github.io"

author:
  avatar: "profile.jpg"
  name: "Jincheng Guan"
  pronouns:
  bio: "Computer Science and Technology"
  location: "University of Science and Technology of China"
  employer:
  uri:
  email: "guanjincheng@mail.ustc.edu.cn"
  academia:
  arxiv:
  googlescholar:
  inspire-hep:
  impactstory:
  orcid:
  semantic:
  ssrn:
